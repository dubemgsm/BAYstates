<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>BAY Conflict Year-filtered Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
 body{font-family:sans-serif;margin:0;padding:0}
 header{position:fixed;top:0;left:0;right:0;height:44px;background:#fff;z-index:1000;padding:6px 10px;box-shadow:0 1px 2px rgba(0,0,0,0.12)}
 #map{position:absolute;top:52px;bottom:0;left:0;right:0}
 .ctrl{display:inline-block;margin-left:10px}
 .legend{background:white;padding:6px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<header>
  <strong>BAY Conflict Events — Year Filter</strong>
  <div class="ctrl">
    <label for="yearSel">Year:</label>
    <select id="yearSel"><option>Loading...</option></select>
    <button id="allBtn">Show All</button>
  </div>
</header>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
var map = L.map('map').setView([11,12.5],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OSM'}).addTo(map);
var lgaLayer, schoolsLayer, idpLayer, conflictLayerGroup;
// add LGA choropleth layer (if exists)
fetch('../data/processed/lga_gap_index.geojson').then(r=>r.json()).then(function(data){
  function style(f){var v=f.properties.gap_index||0;return {fillColor: v>0.8? '#800026': v>0.6? '#BD0026': v>0.4? '#E31A1C': v>0.2? '#FC4E2A': v>0.1? '#FD8D3C':'#FEB24C', weight:1,color:'#444',fillOpacity:0.6}}
  lgaLayer = L.geoJSON(data,{style:style,onEachFeature:function(f,l){var p=f.properties; l.bindPopup('<b>'+ (p.LGA_name||p.LGAname||'') +'</b><br/>Gap: '+(p.gap_index? p.gap_index.toFixed(3):'N/A') );}}).addTo(map);
  map.fitBounds(lgaLayer.getBounds());
});
// Schools represented by LGA centroids from processed LGA file
schoolsLayer = L.layerGroup();
fetch('../data/processed/lga_gap_index.geojson').then(r=>r.json()).then(function(data){
  data.features.forEach(function(f){
    var p = f.properties || {};
    var sc = parseInt(p.schools) || 0;
    if(sc<=0) return;
    // approximate centroid via bbox center
    var coords = f.geometry && f.geometry.coordinates && f.geometry.coordinates.flat(2);
    var lons=[], lats=[];
    if(coords){
      for(var i=0;i<coords.length;i+=2){ lons.push(coords[i]); lats.push(coords[i+1]); }
      var lon = (Math.min.apply(null,lons)+Math.max.apply(null,lons))/2;
      var lat = (Math.min.apply(null,lats)+Math.max.apply(null,lats))/2;
      var r = Math.max(4, Math.log(sc+1)*3);
      var m = L.circleMarker([lat,lon],{radius:r,fillColor:'green',color:'#060',weight:1,fillOpacity:0.9});
      m.bindPopup('<b>Schools (LGA)</b><br/>' + (p.LGA_name||p.NAME_2||p.name||'') + '<br/>Count: ' + sc);
      schoolsLayer.addLayer(m);
    }
  });
  schoolsLayer.addTo(map);
});

// idp
fetch('../data/idp.geojson').then(r=>r.json()).then(function(data){
  idpLayer = L.markerClusterGroup();
  data.features.forEach(function(f){var c=f.geometry.coordinates; var m=L.marker([c[1],c[0]]); m.bindPopup('<b>IDP</b><br/>'+ (f.properties.site_name||'') +'<br/>Pop:'+ (f.properties.population||'')); idpLayer.addLayer(m);});
  idpLayer.addTo(map);
});

// conflicts: load all and build mapping by year
var conflictByYear = {};
fetch('../data/conflict_2020_2025.geojson').then(r=>r.json()).then(function(data){
  // organize features by year
  data.features.forEach(function(f){
    var yr = f.properties.year || f.properties['year'];
    if(yr===undefined || yr===null) return;
    yr = String(yr);
    if(!(yr in conflictByYear)) conflictByYear[yr]=[];
    conflictByYear[yr].push(f);
  });
  // populate year selector sorted descending
  var years = Object.keys(conflictByYear).map(Number).sort(function(a,b){return b-a});
  var sel = document.getElementById('yearSel'); sel.innerHTML='';
  years.forEach(function(y){var opt=document.createElement('option'); opt.value=String(y); opt.text=String(y); sel.appendChild(opt)});
  // add change handler
  sel.addEventListener('change', function(){showYear(sel.value);});
  document.getElementById('allBtn').addEventListener('click', function(){showAll()});
  // default: show latest year
  if(years.length>0) { sel.value=String(years[0]); showYear(String(years[0])); }
});

var currentConflictLayer = null;
function showYear(year){
  // remove existing
  if(currentConflictLayer){ map.removeLayer(currentConflictLayer); currentConflictLayer=null; }
  var features = conflictByYear[year] || [];
  var mc = L.markerClusterGroup();
  features.forEach(function(f){ var c=f.geometry.coordinates; var props=f.properties||{}; var m=L.marker([c[1],c[0]]); var popup = '<b>Conflict</b><br/>' + (props.where_description||props.where_coordinates||'') + '<br/>Date: '+(props.year||props.date||'') + '<br/>Deaths: '+(props.deaths||''); m.bindPopup(popup); mc.addLayer(m); });
  currentConflictLayer = mc; map.addLayer(mc);
}
function showAll(){ if(currentConflictLayer){ map.removeLayer(currentConflictLayer); currentConflictLayer=null;} var mc=L.markerClusterGroup(); Object.keys(conflictByYear).forEach(function(y){ conflictByYear[y].forEach(function(f){ var c=f.geometry.coordinates; var m=L.marker([c[1],c[0]]); m.bindPopup('<b>Conflict</b><br/>' + (f.properties.where_description||'') + '<br/>Year: '+(f.properties.year||'') + '<br/>Deaths: '+(f.properties.deaths||'')); mc.addLayer(m); }); }); currentConflictLayer=mc; map.addLayer(mc); }

</script>
</body>
</html>
