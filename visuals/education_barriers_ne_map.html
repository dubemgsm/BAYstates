<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>BAY Education Barriers (NE Nigeria)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style> body{font-family:sans-serif;margin:0;padding:0} #map{position:absolute;top:40px;bottom:0;left:0;right:0} header{position:fixed;top:0;left:0;right:0;height:40px;background:#fff;z-index:1000;padding:8px;box-shadow:0 1px 2px rgba(0,0,0,0.1)} .legend{background:white;padding:6px;border-radius:4px;font-size:12px}</style>
</head>
<body>
<header><strong>BAY Education Barriers — Borno, Adamawa, Yobe</strong></header>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// LGA choropleth (Gap Index) — states layer removed per user request
function getColor(d){
    return d>0.8 ? '#800026' : d>0.6 ? '#BD0026' : d>0.4 ? '#E31A1C' : d>0.2 ? '#FC4E2A' : d>0.1 ? '#FD8D3C' : '#FEB24C';
}
var map = L.map('map').setView([11,12.5],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OSM'}).addTo(map);

// LGA choropleth (uses processed lga gap index)
fetch('../data/processed/lga_gap_index.geojson').then(r=>r.json()).then(function(data){
    var lga = L.geoJSON(data,{style:function(feature){var v=feature.properties.gap_index||0;return {fillColor:getColor(v),weight:1,color:'#444',fillOpacity:0.7}},onEachFeature:function(f,layer){var p=f.properties;layer.bindPopup('<b>'+ (p.LGA_name||p.name) +'</b><br/>State: '+(p.admin1||'')+'<br/>Gap index: '+(p.gap_index && p.gap_index.toFixed? p.gap_index.toFixed(3):p.gap_index)+'<br/>Schools: '+(p.schools||0)+'<br/>Pop (approx): '+(p.population? Math.round(p.population).toLocaleString() : '0')+'<br/>IDP pop: '+(p.idp? Math.round(p.idp).toLocaleString() : '0'));}},).addTo(map);
    map.fitBounds(lga.getBounds());
});

// Schools shown as LGA centroid markers using processed LGA counts
var schools = L.layerGroup();
fetch('../data/processed/lga_gap_index.geojson').then(r=>r.json()).then(function(data){
    data.features.forEach(function(f){
        var p = f.properties || {};
        var sc = parseInt(p.schools) || 0;
        if(sc<=0) return;
        // bbox centroid approximation
        var coords = f.geometry && f.geometry.coordinates && f.geometry.coordinates.flat(2);
        if(!coords) return;
        var lons=[], lats=[];
        for(var i=0;i<coords.length;i+=2){ lons.push(coords[i]); lats.push(coords[i+1]); }
        var lon = (Math.min.apply(null,lons)+Math.max.apply(null,lons))/2;
        var lat = (Math.min.apply(null,lats)+Math.max.apply(null,lats))/2;
        var r = Math.max(4, Math.log(sc+1)*3);
        var m = L.circleMarker([lat,lon],{radius:r,fillColor:'green',color:'#0a0',weight:1,fillOpacity:0.9});
        m.bindPopup('<b>Schools (LGA)</b><br/>' + (p.LGA_name||p.name||'') + '<br/>Count: ' + sc);
        schools.addLayer(m);
    });
    schools.addTo(map);
});

// IDP cluster
fetch('../data/idp.geojson').then(r=>r.json()).then(function(data){
    var markers = L.markerClusterGroup();
    data.features.forEach(function(f){
        var c = f.geometry.coordinates; var props = f.properties||{};
        var m = L.marker([c[1],c[0]]);
        var popup = '<b>IDP site</b><br/>' + (props.site_name||'') + '<br/>State: '+(props.state||'') + '<br/>Pop: '+(props.population||'');
        m.bindPopup(popup);
        markers.addLayer(m);
    });
    map.addLayer(markers);
});

// Legend — Gap index
var legend = L.control({position:'bottomright'});
legend.onAdd = function(map){
    var div = L.DomUtil.create('div','legend');
    var grades = [0,0.1,0.2,0.4,0.6,0.8];
    div.innerHTML = '<b>LGA Gap index</b><br/>';
    for(var i=0;i<grades.length;i++){
        div.innerHTML += '<i style="background:'+getColor(grades[i]+0.01)+';width:18px;height:12px;display:inline-block;margin-right:6px"></i> ' + grades[i] + (grades[i+1]? '&ndash;'+grades[i+1] : '+') + '<br/>';
    }
    return div;
};
legend.addTo(map);
</script>
</body>
</html>
